summary: Extract metadata from document summary
description: >-
  Fast LLM call to extract title, document type, correspondent and tags
  from the summary using existing Paperless lists only.
lock: ''
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    doc_id:
      type: integer
    summary:
      type: string
    existing_document_types:
      type: array
    existing_tags:
      type: array
    existing_correspondents:
      type: array
    added_date:
      type: string
      default: ''
    current_tag_names:
      type: array
      nullable: true
    current_correspondent_id:
      type: integer
      nullable: true
    current_document_type_id:
      type: integer
      nullable: true
    document_language:
      type: string
      default: de
  required:
    - doc_id
    - summary
    - existing_document_types
    - existing_tags
    - existing_correspondents
