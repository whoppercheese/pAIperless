summary: Resolve document type from summary
description: >-
  LLM call to assign document type when Paperless has none preset.
  Matches existing types or creates a new one in Paperless.
lock: ''
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    doc_id:
      type: integer
    summary:
      type: string
    existing_document_types:
      type: array
    document_language:
      type: string
      default: de
  required:
    - doc_id
    - summary
    - existing_document_types
