summary: Generate and create missing document type / correspondent
description: >-
  Second LLM call when analyze found no match and Paperless has no preset.
  Creates new document types and correspondents in Paperless when needed.
lock: ''
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    doc_id:
      type: integer
    summary:
      type: string
    need_document_type:
      type: boolean
    need_correspondent:
      type: boolean
    document_language:
      type: string
      default: de
  required:
    - doc_id
    - summary
    - need_document_type
    - need_correspondent
