summary: Apply AI-Warning tag when processing had warnings
description: Merges warnings from update and chunk steps and tags the document with AI-Warning in Paperless.
lock: ''
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    doc_id:
      type: integer
    update_warnings:
      type: array
      nullable: true
    chunk_warnings:
      type: array
      nullable: true
  required:
    - doc_id
