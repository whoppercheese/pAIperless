summary: Resolve correspondent from summary
description: >-
  LLM call to assign correspondent when Paperless has none preset.
  Generates a name from the summary and creates it in Paperless.
lock: ''
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    doc_id:
      type: integer
    summary:
      type: string
    document_language:
      type: string
      default: de
  required:
    - doc_id
    - summary
