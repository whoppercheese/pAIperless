summary: Update Paperless document metadata
description: Patches title, document type, correspondent and date in Paperless. Tags are not modified except AI-Processed.
lock: ''
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    doc_id:
      type: integer
    title:
      type: string
    selected_correspondent:
      type: string
      nullable: true
    existing_tags:
      type: array
    current_tag_ids:
      type: array
    existing_correspondents:
      type: array
    existing_document_types:
      type: array
    selected_document_type:
      type: string
      nullable: true
    document_date:
      type: string
      nullable: true
    current_title:
      type: string
      nullable: true
    current_correspondent_id:
      type: integer
      nullable: true
    current_document_type_id:
      type: integer
      nullable: true
    summarize_warnings:
      type: array
      nullable: true
    title_warnings:
      type: array
      nullable: true
    created_document_type:
      type: object
      nullable: true
    created_correspondent:
      type: object
      nullable: true
  required:
    - doc_id
    - title
    - existing_tags
    - existing_correspondents
    - existing_document_types
