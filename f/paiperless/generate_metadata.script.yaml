summary: Generate title, tags and correspondent
description: Uses Ollama to propose metadata and collect warnings for new tags/correspondents.
lock: ''
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    doc_id:
      type: integer
    text:
      type: string
    analysis:
      type: object
    existing_tags:
      type: array
    existing_correspondents:
      type: array
  required:
    - doc_id
    - text
    - analysis
    - existing_tags
    - existing_correspondents
