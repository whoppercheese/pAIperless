summary: Update Paperless document metadata
description: Creates missing tags/correspondents and patches the document in Paperless.
lock: ''
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    doc_id:
      type: integer
    title:
      type: string
    selected_tags:
      type: array
    new_tags:
      type: array
    selected_correspondent:
      type: string
      nullable: true
    new_correspondent:
      type: string
      nullable: true
    existing_tags:
      type: array
    existing_correspondents:
      type: array
    warnings:
      type: array
    analysis:
      type: object
  required:
    - doc_id
    - title
    - selected_tags
    - new_tags
    - existing_tags
    - existing_correspondents
